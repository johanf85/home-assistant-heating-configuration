title: My Home Assistant smart heating configuration
lang: en
description: My configuration for smart heating thermostat with the use of Home Assistant. 

#markdown: kramdown

remote_theme: rundocs/jekyll-rtd-theme

kramdown:
  toc_levels: "2,3"
  parse_block_html: true

readme_index:
   with_frontmatter: true
   
plugins:
  - jekyll-readme-index
  - jekyll-numbered-headings
  - jekyll-last-modified-at

scss: |
  .tableofcontentswrappper{background-color:#e7f2fa;box-shadow: 0 2px 2px 0 rgb(0 0 0 / 14%), 0 3px 1px -2px rgb(0 0 0 / 20%), 0 1px 5px 0 rgb(0 0 0 / 12%);padding:15px;}
  .tableofcontentswrappper ul li{list-style-type: none;}

google:
  gtag: G-ERSFN94HKL
  
exclude:
  - Makefile
  - CNAME
  - Gemfile
  - Gemfile.lock
  - descriptionVoorEnum.md

